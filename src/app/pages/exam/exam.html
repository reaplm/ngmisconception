<!-- Include this script tag or install `@tailwindplus/elements` via npm: -->
<!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script> -->
<header class="bg-white">
  <nav aria-label="Global" class="mx-auto flex max-w-7xl items-center justify-between p-6 lg:px-8">
    <div class="flex lg:flex-1">
      <a href="#" class="-m-1.5 p-1.5">
        <span class="sr-only">Your Company</span>
        <img src="assets/images/logo.png" alt="" class="h-8 w-auto" />
      </a>
    </div>
    <div class="hidden lg:flex lg:flex-1 lg:justify-end">
        <p>Welcome, {{ userEmail }}!</p>
    </div>
    <div class="hidden lg:flex lg:flex-1 lg:justify-end">
      <a href="#" (click)="logout()" class="text-sm/6 font-semibold text-gray-900">Logout</a>
    </div>
  </nav>
</header>

<div class="exam-content space-y-4 max-w-3xl mx-auto p-6 ">
  @for (q of questions; track q.id; let i = $index){
    <div class="max-w-2xl px-8 py-4 bg-white rounded-lg shadow-md dark:bg-gray-800">
      <!-- Question text-->
      <div class="flex items-center justify-between">
          <span class="text-gray-600 dark:text-gray-400">{{ i + 1 }}. {{ q.question_text }}</span>
      </div>

      <div class="flex items-center justify-between mt-4 gap-5">
        <input type="text" placeholder="Type short answer here..." 
        class="flex-1 min-w-0 px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none 
          focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all" />
        <button 
        type="button" 
        class="whitespace-nowrap px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors cursor-pointer">
        Submit
      </button>
      </div>
    </div>
  } @empty {
    <!-- If you see this block on screen, your "this.questions" array is evaluated as 0 length -->
    <div class="p-6 bg-amber-50 text-amber-800 rounded-xl text-center border border-amber-200">
      No questions were received from the server.
    </div>
  }
      
</div>
