<div class="min-h-screen w-full bg-zinc-50 dark:bg-zinc-900 flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="w-full max-w-sm">
        <!-- src/app/auth/register/register.component.html -->
        <form (ngSubmit)="onRegister()"
         class="grid w-full max-w-sm grid-cols-1 gap-8">
        
        <!-- Logo (Standard SVG styled with Tailwind) -->
        <svg class="h-6 text-zinc-950 dark:text-white forced-colors:text-[CanvasText]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L2 22h20L12 2z"/>
        </svg>

        <!-- Heading -->
        <h2 class="text-2xl font-bold tracking-tight text-zinc-950 dark:text-white">
            Create your account
        </h2>

        <!-- Email Field -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Email</label>
            <input type="email" name="email" [(ngModel)]="registerData.email"
            class="block w-full rounded-md border-0 py-1.5 text-zinc-950 shadow-sm ring-1 ring-inset 
            ring-zinc-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm dark:bg-white/5 
            dark:text-white dark:ring-white/10" required/>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Password</label>
            <input type="password" name="password" [(ngModel)]="registerData.password"
            class="block w-full rounded-md border-0 py-1.5 text-zinc-950 shadow-sm ring-1 ring-inset 
            ring-zinc-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm dark:bg-white/5 
            dark:text-white dark:ring-white/10" required/>
        </div>

        <!-- Confirm Password -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Confirm Password</label>
            <input type="password" name="confirmPassword" [(ngModel)]="registerData.confirmPassword"
            class="block w-full rounded-md border-0 py-1.5 text-zinc-950 shadow-sm ring-1 ring-inset 
            ring-zinc-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm dark:bg-white/5 
            dark:text-white dark:ring-white/10" required/>
        </div>

        <!-- Submit Registration Action Button -->
        <button type="submit"
            class="flex w-full justify-center rounded-md bg-[#fcd116] px-3 py-1.5 text-sm font-semibold 
            text-white shadow-sm hover:bg-[#fcd116]disabled:opacity-50 disabled:cursor-not-allowed 
            dark:bg-white dark:text-zinc-950 dark:hover:bg-[#fcd116]">
            Create account
        </button>

        <!-- Redirect Text Link Navigation Link -->
        <p class="text-sm text-zinc-500 dark:text-zinc-400">
            Already have an account? 
            <a href="/api/auth/login" class="font-semibold text-[#fcd116] hover:text-[#fcd116] dark:text-[#fcd116]">
            Sign in
            </a>
        </p>
        </form>
    </div>
</div>
