<div class="min-h-screen w-full bg-zinc-50 dark:bg-zinc-900 flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="w-full max-w-sm">
        <!-- login.component.html -->
        <form (ngSubmit)="onSubmit()" method="POST" class="grid w-full max-w-sm grid-cols-1 gap-8">
        
        <!-- Logo (Standard SVG styled with Tailwind) -->
        <img src="assets/images/logo.png" alt="" class="h-8 w-auto" />

        <!-- Heading -->
        <h2 class="text-2xl font-bold tracking-tight text-zinc-950 dark:text-white">
            Sign in to your account
        </h2>

        <!-- Email Field -->
        <div class="space-y-2">
            <label  
            class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Email</label>
            <input type="email" name="email" [(ngModel)]="loginData.email"
             class="block w-full rounded-md border-0 py-1.5 text-zinc-950 shadow-sm ring-1 ring-inset ring-zinc-300 placeholder:text-zinc-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10" />
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
            <label 
            class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Password</label>
            <input type="password" name="password" [(ngModel)]="loginData.password" 
            class="block w-full rounded-md border-0 py-1.5 text-zinc-950 shadow-sm ring-1 ring-inset ring-zinc-300 placeholder:text-zinc-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10" />
        </div>
        
        <!-- Submit Button -->
        <button type="submit" [disabled]="isLoading"
            class="flex w-full justify-center rounded-md bg-[#fcd116] px-3 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-zinc-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-950 dark:bg-white dark:text-zinc-950 dark:hover:bg-zinc-200">
            {{ isLoading ? 'Loading...' : 'Login' }}
        </button>

        <!-- Actions Panel -->
        <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-zinc-600 dark:text-zinc-400 cursor-pointer">
            <input type="checkbox" name="remember" class="h-4 w-4 rounded border-[#fcd116] text-[#fcd116] focus:ring-indigo-600" />
            <span>Remember me</span>
            </label>
            
            <a href="#" class="text-sm font-semibold text-[#fcd116] hover:text-indigo-500 dark:text-indigo-400">
            Forgot password?
            </a>
        </div>

        <!-- Sign Up Link Footer -->
        <p class="text-center text-sm text-zinc-500 dark:text-zinc-400">
            Don't have an account? 
            <a href="/register" class="font-semibold text-[#fcd116] hover:text-[#fcd116] dark:text-[#fcd116]">
            Sign up
            </a>
        </p>
        </form>
  </div>
</div>
